appId: com.example.hotel_booking
---
- launchApp
- extendedWaitUntil:
    visible: "Hotel Booking"
- assertVisible: "Hotel Booking"
- tapOn: "navigation bar, item 1"
- assertVisible: "Search Hotels"
- inputText: "Holiday"
- tapOn: "Search"
- assertVisible: "Holiday"
- tapOn: "favorite_border"
- tapOn: "Account"
- assertVisible: "Your Account"
- tapOn: "Overview"
- assertVisible: "Hotel Booking"
